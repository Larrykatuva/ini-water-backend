name: Deploy Inibyte App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Ubuntu VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            set -e

            cd /var/www/inibyte/ini-water-backend

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm ci

            echo "🏗 Building app..."
            npm run build

            echo "🔄 Restarting PM2 process..."
            pm2 restart water || pm2 start dist/main.js --name water

            echo "💾 Saving PM2 process list..."
            pm2 save

            echo "📊 PM2 status:"
            pm2 list

            echo "📜 ბოლო logs:"
            pm2 logs --lines 50